name: Wifify
options:
  bundleIdPrefix: com.byronsalty
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  Wifify:
    type: application
    platform: iOS
    sources:
      - path: Wifify
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: Wifify/Wifify-Bridging-Header.h
        INFOPLIST_FILE: Wifify/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Wifify/Resources/Wifify.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.byronsalty.wifify
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CLANG_ENABLE_MODULES: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
